{{- /*
Role-carrying API-key Secrets. Authorino indexes Secrets labelled
`authorino.kuadrant.io/managed-by: authorino`; the AuthPolicy's apiKey.selector
matches `app: rbac-sample-api`. The key value lives under stringData.api_key
(Authorino's conventional key name); roles are carried in annotations and read
by the authorization rules.

DEMO keys only — see values.yaml. Do not commit real credentials.
*/ -}}
{{- range $role, $cfg := .Values.apiKeys }}
---
apiVersion: v1
kind: Secret
metadata:
  name: apikey-{{ $role }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app: {{ include "rbac-poc.name" $ }}
    authorino.kuadrant.io/managed-by: authorino
  annotations:
    kuadrant.io/username: {{ $cfg.username | quote }}
    kuadrant.io/groups: {{ $cfg.groups | quote }}
type: Opaque
stringData:
  api_key: {{ $cfg.key | quote }}
{{- end }}
