apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "rbac-poc.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rbac-poc.labels" . | nindent 4 }}
    # Consumed by kube-state-metrics (gatewayapi_httproute_labels). The Kuadrant
    # "App Developer" Grafana dashboard joins istio_requests_total to the route
    # via these labels (service -> destination_service_name). Without them the
    # API's metrics exist but never appear on the dashboard.
    service: {{ include "rbac-poc.name" . }}
    deployment: {{ include "rbac-poc.name" . }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
  hostnames:
    - {{ .Values.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "rbac-poc.name" . }}
          port: 8080
