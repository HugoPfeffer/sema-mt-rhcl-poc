apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rbac-poc.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "rbac-poc.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "rbac-poc.name" . }}
  template:
    metadata:
      labels:
        {{- include "rbac-poc.labels" . | nindent 8 }}
        # Kiali groups by app + version; inject the Istio sidecar so the workload
        # becomes a mesh node and Kiali shows inbound traffic from the gateway
        # (istio-cni is installed, so this is safe under the restricted-v2 SCC).
        version: v1
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: app
          image: {{ include "rbac-poc.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
