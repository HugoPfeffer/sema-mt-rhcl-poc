apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "unprotected-poc.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "unprotected-poc.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "unprotected-poc.name" . }}
  template:
    metadata:
      labels:
        {{- include "unprotected-poc.labels" . | nindent 8 }}
        # No Istio sidecar: this API deliberately bypasses the mesh and the
        # prod-web gateway — it is exposed directly via an OpenShift Route.
        version: v1
    spec:
      containers:
        - name: app
          image: {{ include "unprotected-poc.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
